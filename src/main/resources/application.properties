spring.application.name=SBNPrj

# application.properties 파일안에서 명령 뒤에 # 주석쓰지말것 -중요
# Web page Setting : 시작주소를 /롤 설정
server.servlet.context-path=/  

#server 의 port 변경
server.port = 8080

# jsp 파일의 위치    src/main/webapp/WEB-INF/views/
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# JSP 수정시 서버 재시작없이 바로 적용할 수 있게 설정
server.servlet.jsp.init-parameters.development = true

# mybatis 설정 :  src/main/resources/   mapper.xml 경로 설정    /** : 하위폴더 포함 모두
mybatis.mapper-locations:classpath:mapper/**/*Mapper.xml

# datasource 설정
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@192.168.0.240:1521:xe
spring.datasource.username=SBN
spring.datasource.password=1234

# Mybatis Sql 로그 출력 설정
#mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

# SQL 실행 시 파라미터 로그를 출력하기 위한 설정
logging.level.com.sbn=DEBUG

## 파일업로드를 위해 추가된 부분
# file upload setting - no need library
spring.servlet.multipart.enabled=true
# 파일 저장 경로
spring.servlet.multipart.location=D:/dev/springboot/SBNPrj/sbndata/
#업로드 될 파일당 최대크기
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=1000MB
#properties 변수
part1.upload-path=D:/dev/springboot/SBNPrj/sbndata/










